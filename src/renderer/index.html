<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkflow</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="actions" role="toolbar" aria-label="Editor actions">
          <button id="sidebar-btn" type="button" class="ghost icon-btn" title="Toggle file sidebar (Cmd/Ctrl+Shift+B)" aria-label="Toggle file sidebar">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4z"/><path d="M9 5v14"/></svg>
          </button>
          <button id="new-btn" type="button" class="icon-btn" title="New file (Cmd/Ctrl+N)" aria-label="New file">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button id="open-btn" type="button" class="icon-btn" title="Open file (Cmd/Ctrl+O)" aria-label="Open file">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 19V6h6l2 2h10v11z"/><path d="M3 11h18"/></svg>
          </button>
          <button id="save-btn" type="button" class="icon-btn" title="Save file (Cmd/Ctrl+S)" aria-label="Save file">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v6h8V4"/><path d="M9 19h6"/></svg>
          </button>
          <button id="save-as-btn" type="button" class="icon-btn" title="Save as (Cmd/Ctrl+Shift+S)" aria-label="Save as">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v6h8V4"/><path d="M12 14v6"/><path d="M9.5 17.5 12 20l2.5-2.5"/></svg>
          </button>
        </div>

        <div class="title-wrap">
          <h1 id="doc-name">Untitled</h1>
          <p id="file-meta">Untitled</p>
        </div>

        <div class="window-actions">
          <button id="theme-btn" type="button" class="ghost icon-btn" title="Toggle light/dark (Cmd/Ctrl+Shift+L)" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v2M12 19v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M3 12h2M19 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/><circle cx="12" cy="12" r="4"/></svg>
          </button>
        </div>
      </header>

      <main id="workspace" class="workspace">
        <aside id="sidebar" class="sidebar panel">
          <header class="sidebar-header">
            <h2>Files</h2>
            <p id="workspace-meta"></p>
          </header>
          <div id="file-tree" class="file-tree"></div>
        </aside>

        <section class="panel editor-panel">
          <label class="sr-only" for="editor-surface">Markdown editor</label>
          <div id="editor-surface" class="editor-surface" contenteditable="true" spellcheck="true" data-placeholder="Start writing markdown..."></div>
        </section>
      </main>
    </div>

    <script src="./renderer.js" type="module"></script>
  </body>
</html>
